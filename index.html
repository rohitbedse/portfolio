<body>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, useScroll, useTransform, AnimatePresence } = window.Motion;

    // ════════════════════════════════════════════════════════════
    // 3D BACKGROUND COMPONENT (Pure Three.js via vanilla refs)
    // ════════════════════════════════════════════════════════════
    const ThreeBackground = () => {
      const mountRef = useRef(null);

      useEffect(() => {
        let scene, camera, renderer, particles;
        const init = () => {
          scene = new THREE.Scene();
          camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
          renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
          renderer.setSize(window.innerWidth, window.innerHeight);
          mountRef.current.appendChild(renderer.domElement);

          // Create Neural Data Points
          const geometry = new THREE.BufferGeometry();
          const vertices = [];
          for (let i = 0; i < 800; i++) {
            vertices.push(
              (Math.random() - 0.5) * 20, 
              (Math.random() - 0.5) * 20, 
              (Math.random() - 0.5) * 20
            );
          }
          geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
          
          const material = new THREE.PointsMaterial({ 
            color: 0x3b82f6, 
            size: 0.05, 
            transparent: true, 
            opacity: 0.6 
          });
          
          particles = new THREE.Points(geometry, material);
          scene.add(particles);
          camera.position.z = 5;

          const animate = () => {
            requestAnimationFrame(animate);
            particles.rotation.x += 0.0005;
            particles.rotation.y += 0.001;
            renderer.render(scene, camera);
          };
          animate();
        };

        init();

        const handleResize = () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        };
        window.addEventListener('resize', handleResize);

        return () => {
          window.removeEventListener('resize', handleResize);
          if (mountRef.current) mountRef.current.removeChild(renderer.domElement);
        };
      }, []);

      return <div ref={mountRef} className="fixed inset-0 z-0 pointer-events-none opacity-40" />;
    };

    // ════════════════════════════════════════════════════════════
    // HERO SECTION
    // ════════════════════════════════════════════════════════════

            transition={{ duration: 1, ease: "easeOut" }}
            className="text-center"
          >
            <p className="text-sm md:text-base tracking-[0.3em] text-gray-400 uppercase mb-4">AI/ML Engineer & GenAI Developer</p>

            <div className="flex gap-4 justify-center">

            </div>
          </motion.div>

          {/* Scroll Indicator */}

            className="absolute bottom-10 flex flex-col items-center gap-2"
            animate={{ y: [0, 10, 0] }}
            transition={{ repeat: Infinity, duration: 2 }}
          >
            <span className="text-[10px] uppercase tracking-widest text-gray-500">Scroll Context</span>
            <div className="w-[1px] h-12 bg-gradient-to-b from-primary to-transparent" />

      );
    };

    // ════════════════════════════════════════════════════════════
    // PROJECTS (3D Tilt Cards)
    // ════════════════════════════════════════════════════════════
    const TiltCard = ({ project }) => {
      const [tilt, setTilt] = useState({ x: 0, y: 0 });
      
      const handleMouseMove = (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        setTilt({ x: (y - centerY) / 20, y: (centerX - x) / 20 });
      };

      return (
        <motion.div 
          className="glass rounded-2xl p-6 group cursor-pointer relative"
          onMouseMove={handleMouseMove}
          onMouseLeave={() => setTilt({ x: 0, y: 0 })}
          animate={{ rotateX: tilt.x, rotateY: tilt.y }}
          transition={{ type: "spring", stiffness: 300, damping: 20 }}
          style={{ transformStyle: "preserve-3d" }}
          initial={{ opacity: 0, y: 20 }}
          whileInView={{ opacity: 1, y: 0 }}
          viewport={{ once: true }}
        >
          {/* Internal content pushed in Z-space */}

            <div className="flex justify-between items-start mb-4">
              <span className="text-3xl">{project.icon}</span>
              <span className="font-mono text-xs text-primary bg-primary/10 px-2 py-1 rounded">{project.acc}</span>
            </div>
            <h3 className="text-2xl font-display font-medium mb-2">{project.title}</h3>
            <p className="text-gray-400 text-sm mb-6">{project.desc}</p>
            
            <div className="flex flex-wrap gap-2 mb-8">
              {project.tags.map(t => (
                <span key={t} className="text-[10px] uppercase font-mono tracking-wider border border-white/20 px-2 py-1 rounded-full text-gray-300">

            </div>

            {/* Hover overlay actions */}
            <div className="flex gap-3">
              <a href="#" rel="noopener noreferrer" className="flex-1 text-center py-2 bg-white text-black text-sm font-medium rounded-lg hover:bg-gray-200 transition-colors">Demo</a>
              <a href="#" rel="noopener noreferrer" className="flex-1 text-center py-2 border border-white/20 text-white text-sm font-medium rounded-lg hover:bg-white/10 transition-colors">GitHub</a>
            </div>
          </div>
        </motion.div>
      );
    }

    const Projects = () => {
      const projects = [
        { title: "Swiggy ETA Prediction", desc: "Gradient-boosted routing model predicting delivery times with ±3 min MAE.", tags: ["Python", "XGBoost", "Geospatial"], acc: "XGBoost/MAE", icon: "🛵" },

    // ════════════════════════════════════════════════════════════
    // NAVIGATION & FOOTER

    // Render the React app

  </script>
</body>
